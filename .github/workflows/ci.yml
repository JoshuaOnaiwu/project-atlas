name: Atlas CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Download Dependencies
        run: go mod download

      - name: Run Tests
        run: go test ./...

      - name: Build Application
        run: go build -o atlas-server ./cmd/server

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::243699833421:role/github-actions-oidc-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t project-atlas:${{ github.sha }} .

      - name: Tag Docker Image
        run: |
          docker tag project-atlas:${{ github.sha }} \
          243699833421.dkr.ecr.us-east-1.amazonaws.com/project-atlas:${{ github.sha }}

      - name: Push Docker Image to ECR
        run: |
          docker push \
          243699833421.dkr.ecr.us-east-1.amazonaws.com/project-atlas:${{ github.sha }}